server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy /api → backend (docker-compose only).
    # On Railway VITE_API_URL points to the public backend URL, so this block
    # is never hit. The variable-based proxy_pass defers DNS lookup to
    # request time, preventing nginx from crashing at startup when the
    # 'backend' hostname does not exist (e.g. standalone Railway service).
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream http://backend:8080;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
