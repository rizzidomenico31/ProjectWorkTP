services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=8080
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/chatdb}
    ports:
      - "8081:8080"
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # In locale punta al backend esposto sulla porta 8081 dell'host.
        # Su Railway usa VITE_API_URL=https://<backend>.up.railway.app
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8081}
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
